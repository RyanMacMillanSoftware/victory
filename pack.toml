# pack.toml — Victory pack manifest
#
# Declares the contents and capabilities of this pack.
# The pack is the deployable unit: everything an agent needs
# to operate within the Victory rig.

[pack]
name = "victory"
version = "0.1.0"
description = "Victory rig pack — agents, formulas, and configuration for autonomous delivery"

[pack.directories]
agents = "agents/"
formulas = "formulas/"
orders = "orders/"
prompts = "prompts/"
config = "config/"
dashboard = "dashboard/"
schemas = "schemas/"
scripts = "scripts/"

[pack.defaults]
config = "config/defaults.toml"
model_routing = "config/model-routing.toml"
safety_rails = "config/safety-rails.toml"
provider_hooks = "config/hooks.json"
